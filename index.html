    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="IPower Strength Ciudad Real | Club de Fuerza & Gimnasio 24 Horas" />
    <meta property="og:description" content="🔥 Tu templo de la fuerza en Ciudad Real abierto 24 horas al día. Equipamiento de alta gama certificado, acceso inteligente total y comunidad real. ¡Apúntate ya!" />
    <meta property="og:image" content="hero_preview.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="hero_preview.jpg" />

    <!-- Favicon e branding -->
    <link rel="icon" type="image/jpeg" href="hero_preview.jpg" />

    <!-- Script de adaptabilidad dinámica para paths absolutos en cualquier hosting (GitHub Pages, etc) -->
    <script>
      (function() {
        const updateSeoPaths = () => {
          // Obtener base URL actual
          const href = window.location.href;
          const origin = window.location.origin;
          
          // Reemplazar o crear link canonical
          let canonical = document.querySelector("link[rel='canonical']");
          if (!canonical) {
            canonical = document.createElement("link");
            canonical.setAttribute("rel", "canonical");
            document.head.appendChild(canonical);
          }
          canonical.setAttribute("href", href);

          // Establecer og:url absoluta
          const ogUrl = document.querySelector("meta[property='og:url']");
          if (ogUrl) {
            ogUrl.setAttribute("content", href);
          }

          // Resolver og:image a URL absoluta (crucial para whatsapp scraper)
          const ogImg = document.querySelector("meta[property='og:image']");
          if (ogImg) {
            const currentImgPath = ogImg.getAttribute("content");
            if (!currentImgPath.startsWith("http")) {
              // Obtener path absoluto relativo a la ubicación actual de la página para soportar subcarpetas en GitHub Pages
              const absoluteImgUrl = new URL(currentImgPath, window.location.href).href;
              ogImg.setAttribute("content", absoluteImgUrl);
            }
          }

          // Resolver twitter:image a URL absoluta
          const twitterImg = document.querySelector("meta[name='twitter:image']");
          if (twitterImg) {
            const currentImgPath = twitterImg.getAttribute("content");
            if (!currentImgPath.startsWith("http")) {
              const absoluteImgUrl = new URL(currentImgPath, window.location.href).href;
              twitterImg.setAttribute("content", absoluteImgUrl);
            }
          }
        };

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", updateSeoPaths);
        } else {
          updateSeoPaths();
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
